<!DOCTYPE html>
<html>
<head>
    <title>Animal Attractions Finder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-plugins/1.0.0/leaflet-providers.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #map {
            height: 500px;
            width: 100%;
            border: 1px solid #ccc;
        }
        #searchForm {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }
        label {
            margin-right: 10px;
            font-weight: bold;
        }
        input {
            margin-right: 20px;
            padding: 5px;
            border: 1px solid #999;
            border-radius: 3px;
            width: 120px;
        }
        #attractionCount {
            margin-left: 20px;
            font-weight: bold;
            color: #333;
        }
        button {
            padding: 8px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Find Animal Attractions</h1>
    <form id="searchForm">
        <label for="zipCode">Zip Code or City:</label>
        <input type="text" id="zipCode" name="zipCode" placeholder="e.g., 78666 or San Marcos, TX" required>
        <label for="distance">Distance (miles):</label>
        <input type="number" id="distance" name="distance" min="1" value="10" required>
        <button type="submit">Search</button>
        <span id="attractionCount">Found: 0 attractions</span>
    </form>
    <div id="map"></div>

    <script>
        let map;
        let markers = [];
        let searchCircle = null;
        let attractionCount = 0;

        function initMap() {
            // Initialize map centered on San Marcos, TX
            map = L.map('map').setView([28.890661, -97.911530], 4);
            
            // Add OpenStreetMap tiles (no watermark, completely free)
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);
            
            // Add Locate Me button
            addLocateMeButton();
        }

        function addLocateMeButton() {
            const locateMeControl = L.Control.extend({
                options: {
                    position: 'topleft'
                },
                onAdd: function(map) {
                    const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                    const button = L.DomUtil.create('a', 'leaflet-control-locate', container);
                    button.href = '#';
                    button.title = 'Locate Me';
                    button.innerHTML = '📍';
                    button.style.fontSize = '18px';
                    button.style.padding = '5px 8px';
                    button.style.cursor = 'pointer';
                    
                    L.DomEvent.on(button, 'click', L.DomEvent.preventDefault);
                    L.DomEvent.on(button, 'click', handleLocateMe);
                    
                    return container;
                }
            });
            
            new locateMeControl().addTo(map);
        }

        function handleLocateMe() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const { latitude, longitude } = position.coords;
                        
                        try {
                            // Center map on user's location
                            map.setView([latitude, longitude], 12);
                            
                            // Add a marker for current location
                            L.marker([latitude, longitude], {
                                icon: L.icon({
                                    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
                                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                                    iconSize: [25, 41],
                                    iconAnchor: [12, 41],
                                    popupAnchor: [1, -34],
                                    shadowSize: [41, 41]
                                })
                            }).addTo(map).bindPopup('Your Location');
                            
                            // Use reverse geocoding to get zip code
                            const response = await fetch(
                                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`
                            );
                            const data = await response.json();
                            
                            // Extract zip code from address
                            const zipCode = data.address?.postcode || data.address?.postal_code;
                            
                            if (zipCode) {
                                document.getElementById('zipCode').value = zipCode;
                            } else {
                                alert('Could not find zip code for your location. Please enter manually.');
                            }
                        } catch (error) {
                            console.error('Error reverse geocoding:', error);
                            alert('Error finding zip code. Please try again.');
                        }
                    },
                    (error) => {
                        console.error('Geolocation error:', error);
                        alert('Could not access your location. Please enable location services.');
                    }
                );
            } else {
                alert('Geolocation is not supported by your browser.');
            }
        }

        function geocodeLocation(address) {
            // Using Nominatim (OpenStreetMap's free geocoding service)
            // Add ", USA" to ensure we search in the United States
            const searchQuery = address.includes('USA') || address.includes('US') ? address : `${address}, USA`;
            return fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(searchQuery)}&format=json`)
                .then(response => response.json())
                .then(results => {
                    if (results.length === 0) {
                        throw new Error('Location not found');
                    }
                    return [parseFloat(results[0].lat), parseFloat(results[0].lon)];
                });
        }

        function clearMarkers() {
            // Remove all existing markers
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];
            attractionCount = 0;
            document.getElementById('attractionCount').textContent = 'Found: 0 attractions';
            
            // Remove search circle
            if (searchCircle) {
                map.removeLayer(searchCircle);
                searchCircle = null;
            }
        }

        function searchNearby(lat, lng, radiusMeters) {
            // Using Overpass API to search for zoos, aquariums, and wildlife attractions
            const query = `
                [bbox:${lat - 0.2},${lng - 0.2},${lat + 0.2},${lng + 0.2}];
                (
                    node["tourism"="zoo"];
                    node["leisure"="nature_reserve"];
                    way["tourism"="zoo"];
                    way["leisure"="nature_reserve"];
                    node["amenity"="aquarium"];
                    way["amenity"="aquarium"];
                );
                out center;
            `;

            const overpassUrl = 'https://overpass-api.de/api/interpreter';
            
            fetch(overpassUrl, {
                method: 'POST',
                body: query
            })
            .then(response => response.json())
            .then(data => {
                if (data.elements) {
                    data.elements.forEach(element => {
                        let lat, lng, name;
                        
                        if (element.center) {
                            lat = element.center.lat;
                            lng = element.center.lon;
                        } else if (element.lat) {
                            lat = element.lat;
                            lng = element.lon;
                        }
                        
                        name = element.tags.name || 'Animal Attraction';
                        
                        if (lat && lng) {
                            // Check if within radius
                            const distance = getDistance([lat, lng], [lat, lng]);
                            if (distance <= radiusMeters) {
                                createMarker(lat, lng, name);
                            }
                        }
                    });
                }
            })
            .catch(error => {
                console.error('Error searching attractions:', error);
            });
        }

        function getDistance(coord1, coord2) {
            // Haversine formula to calculate distance between two coordinates
            const R = 6371000; // Earth's radius in meters
            const lat1 = coord1[0] * Math.PI / 180;
            const lat2 = coord2[0] * Math.PI / 180;
            const deltaLat = (coord2[0] - coord1[0]) * Math.PI / 180;
            const deltaLng = (coord2[1] - coord1[1]) * Math.PI / 180;
            
            const a = Math.sin(deltaLat / 2) * Math.sin(deltaLat / 2) +
                      Math.cos(lat1) * Math.cos(lat2) *
                      Math.sin(deltaLng / 2) * Math.sin(deltaLng / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            
            return R * c;
        }

        function createMarker(lat, lng, name) {
            const marker = L.marker([lat, lng]).addTo(map);
            marker.bindPopup(`<strong>${name}</strong>`);
            markers.push(marker);
            attractionCount++;
            document.getElementById('attractionCount').textContent = `Found: ${attractionCount} attraction${attractionCount !== 1 ? 's' : ''}`;
        }

        document.getElementById('searchForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const address = document.getElementById('zipCode').value;
            const distance = parseInt(document.getElementById('distance').value);

            // Clear previous search results
            clearMarkers();

            try {
                const [lat, lng] = await geocodeLocation(address);
                
                // Center map on the location
                map.setView([lat, lng], 10);
                
                // Add search radius circle
                searchCircle = L.circle([lat, lng], {
                    radius: distance * 1609.34, // Convert miles to meters
                    color: '#FF0000',
                    fillColor: '#FF0000',
                    fillOpacity: 0.15,
                    weight: 2,
                    opacity: 0.8
                }).addTo(map);
                
                // Automatically resize map to fit the search circle
                map.fitBounds(searchCircle.getBounds(), { padding: [50, 50] });
                
                // Search for animal attractions
                searchNearby(lat, lng, distance * 1609.34);
                
                console.log(`Searching for animal attractions within ${distance} miles of ${address}`);
            } catch (error) {
                console.error('Error:', error);
            }
        });

        window.onload = initMap;
    </script>
</body>
</html>
