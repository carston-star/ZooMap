<html>
<head>
    <title>Animal Attractions Finder</title>
    <style>
        #map {
            height: 500px;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>Find Animal Attractions</h1>
    <form id="searchForm">
        <label for="zipCode">Zip Code:</label>
        <input type="text" id="zipCode" name="zipCode" required>
        <label for="distance">Distance (miles):</label>
        <input type="number" id="distance" name="distance" required>
        <button type="submit">Search</button>
    </form>
    <div id="map"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCJiFNjvV4IfLTf9DkVFYNZ8IQJYgrxEdE&libraries=places"></script>
    <script>
        let map;

        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 29.8833, lng: -97.9414 }, // San Marcos, TX
                zoom: 20
            });
        }

        function geocodeZipCode(zipCode) {
            const geocoder = new google.maps.Geocoder();
            return new Promise((resolve, reject) => {
                geocoder.geocode({ 'address': zipCode }, (results, status) => {
                    if (status === 'OK') {
                        resolve(results[0].geometry.location);
                    } else {
                        reject('Geocode was not successful for the following reason: ' + status);
                    }
                });
            });
        }

        function searchNearby(location, radius) {
            const service = new google.maps.places.PlacesService(map);
            const request = {
                location: location,
                radius: radius,
                type: ['zoo', 'aquarium']
            };

            service.nearbySearch(request, (results, status) => {
                if (status === google.maps.places.PlacesServiceStatus.OK) {
                    for (let i = 0; i < results.length; i++) {
                        createMarker(results[i]);
                    }
                }
            });
        }

        function createMarker(place) {
            const customIcon = {
                url: 'https://git.txstate.edu/qly6/ZooTest/blob/main/zoo.png', // URL to zoo icon
                scaledSize: new google.maps.Size(32, 32), // Scaled size of the icon
                origin: new google.maps.Point(0, 0), // Origin point of the icon
                anchor: new google.maps.Point(16, 32) // Anchor point of the icon
            };

            const marker = new google.maps.Marker({
                map: map,
                position: place.geometry.location,
                icon: customIcon
            });

            google.maps.event.addListener(marker, 'click', () => {
                const infowindow = new google.maps.InfoWindow({
                    content: place.name
                });
                infowindow.open(map, marker);
            });
        }

        document.getElementById('searchForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const zipCode = document.getElementById('zipCode').value;
            const distance = document.getElementById('distance').value;

            try {
                const location = await geocodeZipCode(zipCode);
                map.setCenter(location);
                map.setZoom(10);

                // Add a red circle to the map
                const circle = new google.maps.Circle({
                    map: map,
                    radius: distance * 1609.34, // Convert miles to meters
                    fillColor: '#FF0000',
                    fillOpacity: 0.15, // Changed from 0.35 to 0.15
                    strokeColor: '#FF0000',
                    strokeOpacity: 0.8,
                    strokeWeight: 2,
                    center: location
                });

                // Search for zoos and aquariums within the specified distance
                searchNearby(location, distance * 1609.34);

                console.log(`Searching for zoos and aquariums within ${distance} miles of ${zipCode}`);
            } catch (error) {
                console.error(error);
            }
        });

        window.onload = initMap;
    </script>
</body>
</html>
